steps:
  # Step 1: Build the Docker container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/zenith-agent-os', '.']
    
  # Step 2: Push the container image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/zenith-agent-os']
    
  # Step 3: Deploy the container to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'zenith-agent-os'
      - '--image'
      - 'gcr.io/$PROJECT_ID/zenith-agent-os'
      - '--region'
      - 'asia-south1' # Deploys to Mumbai (closest to your region for lower latency)
      - '--allow-unauthenticated'
      - '--port'
      - '8080'

images:
  - 'gcr.io/$PROJECT_ID/zenith-agent-os'